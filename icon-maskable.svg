<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable Becoming Engine icon.
       Android adaptive icons crop the canvas to a circle / squircle
       of the inner ~80%. We scale the figure to 0.8 inside a 51px
       inset so the entire crane survives any launcher's mask shape.
       Edges keep the dark background colour so the masked tile
       still reads as a unified dark icon, not a transparent cutout. -->
  <rect width="512" height="512" fill="#10141a"/>
  <g transform="translate(51 51) scale(0.80)">
    <rect width="512" height="512" fill="#10141a"/>
    <g stroke="#7a8493" stroke-linecap="square" fill="none">

      <g stroke-width="8">
        <line x1="216" y1="116" x2="216" y2="420"/>
        <line x1="264" y1="116" x2="264" y2="420"/>
      </g>
      <g stroke-width="4" opacity="0.70">
        <line x1="216" y1="160" x2="264" y2="160"/>
        <line x1="216" y1="208" x2="264" y2="208"/>
        <line x1="216" y1="256" x2="264" y2="256"/>
        <line x1="216" y1="304" x2="264" y2="304"/>
        <line x1="216" y1="352" x2="264" y2="352"/>
        <line x1="216" y1="160" x2="264" y2="208"/>
        <line x1="264" y1="160" x2="216" y2="208"/>
        <line x1="216" y1="208" x2="264" y2="256"/>
        <line x1="264" y1="208" x2="216" y2="256"/>
        <line x1="216" y1="256" x2="264" y2="304"/>
        <line x1="264" y1="256" x2="216" y2="304"/>
        <line x1="216" y1="304" x2="264" y2="352"/>
        <line x1="264" y1="304" x2="216" y2="352"/>
      </g>

      <rect x="200" y="92" width="80" height="28" stroke-width="6"/>

      <g stroke-width="8">
        <line x1="280" y1="106" x2="436" y2="106"/>
      </g>
      <g stroke-width="4" opacity="0.70">
        <line x1="240" y1="60"  x2="436" y2="106"/>
        <line x1="300" y1="106" x2="320" y2="130"/>
        <line x1="320" y1="130" x2="340" y2="106"/>
        <line x1="340" y1="106" x2="360" y2="130"/>
        <line x1="360" y1="130" x2="380" y2="106"/>
        <line x1="380" y1="106" x2="400" y2="130"/>
        <line x1="400" y1="130" x2="420" y2="106"/>
        <line x1="300" y1="130" x2="420" y2="130"/>
      </g>

      <g stroke-width="8">
        <line x1="200" y1="106" x2="140" y2="106"/>
      </g>
      <rect x="120" y="106" width="36" height="24" stroke-width="6"
            fill="rgba(122, 132, 147, 0.30)"/>
      <line x1="240" y1="60"  x2="156" y2="106" stroke-width="4" opacity="0.70"/>

      <line x1="240" y1="60"  x2="240" y2="92"  stroke-width="4" opacity="0.70"/>

      <g stroke-width="3" opacity="0.85">
        <line x1="380" y1="130" x2="380" y2="240"/>
      </g>
      <path d="M 372 240 L 380 256 L 388 240"
            stroke-width="4" opacity="0.85"/>

      <line x1="92"  y1="420" x2="420" y2="420"
            stroke-width="3" opacity="0.40"/>
    </g>
  </g>
</svg>
